name: Update Contributors

on:
  pull_request:
    types: [closed]        # fires when a PR is merged or closed
  schedule:
    - cron: "0 0 * * 0"   # also runs every Sunday midnight UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-contributors:
    # only run on merged PRs (not just closed), or on schedule/manual
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the README update

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch top contributors via GitHub API
        id: contributors
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Fetch contributors sorted by contribution count
            const { data } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 20,
            });

            // Filter out bots
            const humans = data.filter(c => c.type !== 'Bot' && !c.login.includes('[bot]'));

            // Build the markdown table rows
            const rows = humans.map((c, i) => {
              return `| ${i + 1} | [@${c.login}](https://github.com/${c.login}) | ${c.contributions} | — |`;
            }).join('\n');

            const table = `<!-- CONTRIBUTORS-TABLE-START -->
            > 📌 Top contributors by commits + PRs — auto-updated by GitHub Actions on every merge.

            | # | Contributor | Contributions | Area |
            |---|-------------|:-------------:|------|
            ${rows}
            <!-- CONTRIBUTORS-TABLE-END -->`;

            core.setOutput('table', table);

      - name: Update README with new contributors table
        run: |
          # Use Python to safely replace content between markers
          python3 - <<'EOF'
          import re, os

          table = os.environ['CONTRIBUTORS_TABLE']

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # Replace everything between the marker comments
          pattern = r'<!-- CONTRIBUTORS-TABLE-START -->.*?<!-- CONTRIBUTORS-TABLE-END -->'
          replacement = table
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_content)

          print("README updated successfully.")
          EOF
        env:
          CONTRIBUTORS_TABLE: ${{ steps.contributors.outputs.table }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: auto-update contributors table [skip ci]" &&
            git push
          )
