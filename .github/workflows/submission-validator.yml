name: PR Submission Validator

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Target Branch)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch and checkout PR Submissions
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git checkout pr-branch -- submissions || true

      - name: Validate Submissions
        id: validate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get changed files in PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const failures = [];
            const successes = [];

            let hasExistingCodeChanges = false;
            let hasDeletions = false;
            const modifiedExistingFiles = [];

            for (const file of files) {
              if (file.status !== 'added') {
                hasExistingCodeChanges = true;
                modifiedExistingFiles.push(file.filename);
              }
              if ((file.deletions || 0) > 0) {
                hasDeletions = true;
              }
            }

            if (hasExistingCodeChanges || hasDeletions) {
              const casingErrors = [];
              if (hasExistingCodeChanges) {
                casingErrors.push(`Repository rule violation: You are not allowed to change existing code. Modified existing files: ${modifiedExistingFiles.join(', ')}.`);
              }
              if (hasDeletions) {
                casingErrors.push(`Repository rule violation: You are not allowed to delete any code.`);
              }
              failures.push({
                folder: 'Strict Code Integrity Protection',
                casingErrors,
                missing: [],
                present: []
              });
            }

            // Identify unique folders modified under submissions/examples/ or submissions/
            const exampleFolders = new Set();
            const casingErrors = [];
            const folderCaseMap = new Map();
            const coreFiles = [];

            for (const file of files) {
              if (file.status === 'removed') continue;
              const filename = file.filename;
              if (filename.startsWith('submissions/')) {
                const parts = filename.split('/');
                if (parts.length >= 2) {
                  let folderPath;
                  let folderName;
                  let baseName;
                  
                  if ((parts[1] === 'examples' || parts[1] === 'docs') && parts.length >= 3) {
                    folderPath = `${parts[0]}/${parts[1]}/${parts[2]}`;
                    folderName = parts[2];
                    if (parts.length === 4) {
                      baseName = parts[3];
                    }
                  } else if (parts[1] !== 'examples' && parts[1] !== 'docs') {
                    folderPath = `${parts[0]}/${parts[1]}`;
                    folderName = parts[1];
                    if (parts.length === 3) {
                      baseName = parts[2];
                    }
                  }
                  
                  if (folderPath) {
                    const fullFolderPath = path.join(process.env.GITHUB_WORKSPACE || '', folderPath);
                    if (fs.existsSync(fullFolderPath) && fs.statSync(fullFolderPath).isDirectory()) {
                      exampleFolders.add(folderPath);
                      
                      const lowerFolder = folderName.toLowerCase();
                      if (folderCaseMap.has(lowerFolder) && folderCaseMap.get(lowerFolder) !== folderName) {
                        casingErrors.push(`Folder name collision detected: '${folderCaseMap.get(lowerFolder)}' and '${folderName}' differ only by letter casing.`);
                      } else {
                        folderCaseMap.set(lowerFolder, folderName);
                      }
                    }
                  }
                  
                  if (baseName) {
                    if (baseName.toLowerCase() === 'readme.md' && baseName !== 'README.md') {
                      casingErrors.push(`File \`${filename}\` must be named exactly \`README.md\` (case-sensitive).`);
                    }
                    if (baseName.toLowerCase() === 'style.css' && baseName !== 'style.css') {
                      casingErrors.push(`File \`${filename}\` must be named exactly \`style.css\` (all lowercase).`);
                    }
                    if (baseName.toLowerCase() === 'demo.html' && baseName !== 'demo.html') {
                      casingErrors.push(`File \`${filename}\` must be named exactly \`demo.html\` (all lowercase).`);
                    }
                  }
                }
              } else {
                if (
                  filename !== 'README.md' &&
                  filename !== 'LICENSE' &&
                  filename !== 'package.json' &&
                  filename !== 'easemotion.css' &&
                  filename !== 'easemotion.min.css'
                ) {
                  coreFiles.push(filename);
                }
              }
            }

            if (coreFiles.length > 0) {
              failures.push({
                folder: 'Core Framework Protection',
                casingErrors: [`PR modifies core framework/configuration files: ${coreFiles.join(', ')}. Contributors are only allowed to modify files inside the \`submissions/\` directory.`],
                missing: [],
                present: []
              });
            }

            if (exampleFolders.size === 0) {
              failures.push({
                folder: 'Submission Folder Protection',
                casingErrors: ['This PR does not contain any modifications or additions inside the `submissions/` directory. Contributors must place their submissions under `submissions/examples/your-feature-name/`.'],
                missing: [],
                present: []
              });
            }

            // Required files and their purposes
            const requiredFiles = {
              'demo.html': 'Interactive demo showcasing your feature',
              'style.css': 'CSS styles for the demo',
              'README.md': 'Documentation and usage guide'
            };

            if (casingErrors.length > 0) {
              failures.push({
                folder: 'Casing Violations (Windows Compatibility)',
                casingErrors,
                missing: [],
                present: []
              });
            }

            for (const folder of exampleFolders) {
              const missing = [];
              const present = [];
              
              for (const [reqFile, purpose] of Object.entries(requiredFiles)) {
                const filePath = path.join(process.env.GITHUB_WORKSPACE, folder, reqFile);
                if (!fs.existsSync(filePath)) {
                  missing.push({ file: reqFile, purpose });
                } else {
                  present.push({ file: reqFile, purpose });
                }
              }
              
              if (missing.length > 0) {
                failures.push({ folder, missing, present });
              } else {
                successes.push({ folder, present });
              }
            }

            // Strict rule check: min 250 lines of code or all files changed
            let totalLinesChanged = 0;
            for (const file of files) {
              totalLinesChanged += (file.additions || 0) + (file.deletions || 0);
            }

            const changedFilesSet = new Set(files.map(f => f.filename));
            let allFilesChangedInAllFolders = true;
            if (exampleFolders.size === 0) {
              allFilesChangedInAllFolders = false;
            }
            
            for (const folder of exampleFolders) {
              const req1 = `${folder}/demo.html`;
              const req2 = `${folder}/style.css`;
              const req3 = `${folder}/README.md`;
              
              if (!changedFilesSet.has(req1) || !changedFilesSet.has(req2) || !changedFilesSet.has(req3)) {
                allFilesChangedInAllFolders = false;
                break;
              }
            }

            let isSpamExploit = hasExistingCodeChanges || hasDeletions;
            if (!isSpamExploit && failures.length === 0 && totalLinesChanged < 250 && !allFilesChangedInAllFolders) {
              isSpamExploit = true;
              failures.push({
                folder: 'Strict Modification Policy',
                casingErrors: [
                  `Repository rules violation: This PR modified only ${totalLinesChanged} lines of code and did not modify all 3 required files (demo.html, style.css, README.md) in the submission folder.`,
                  `Under the strict rules, a PR must change at least 250 lines of code OR modify/create all three required files in the submission folder to prevent spam/low-effort exploits.`
                ],
                missing: [],
                present: []
              });
            }

            // Store results for later steps
            core.setOutput('failures', JSON.stringify(failures));
            core.setOutput('successes', JSON.stringify(successes));
            core.setOutput('hasFailures', failures.length > 0);
            core.setOutput('isSpamExploit', isSpamExploit ? 'true' : 'false');

            if (failures.length > 0) {
              console.log(`❌ Validation failed for ${failures.length} folder(s)`);
              core.setFailed('PR does not meet submission requirements.');
            } else {
              console.log(`✅ All ${successes.length} folder(s) validated successfully!`);
            }

      - name: Create/Update Failure Comment
        if: failure() && steps.validate.outputs.hasFailures == 'true'
        uses: actions/github-script@v7
        env:
          FAILURES_JSON: ${{ steps.validate.outputs.failures }}
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const failures = JSON.parse(process.env.FAILURES_JSON);
            
            let commentBody = `## ❌ Submission Validation Failed\n\n`;
            commentBody += `Thank you for your contribution! However, some required files are missing.\n\n`;
            commentBody += `### 📋 Required Structure\n`;
            commentBody += `\`\`\`\n`;
            commentBody += `submissions/examples/your-feature-name/\n`;
            commentBody += `├── demo.html     ← Interactive demo (required)\n`;
            commentBody += `├── style.css     ← CSS styles (required)\n`;
            commentBody += `└── README.md     ← Documentation (required)\n`;
            commentBody += `\`\`\`\n\n`;
            commentBody += `### 🔍 Issues Found:\n\n`;
            
            for (const fail of failures) {
              if (fail.casingErrors && fail.casingErrors.length > 0) {
                commentBody += `#### 🔠 Folder: \`${fail.folder}\`\n\n`;
                commentBody += `**Case-sensitivity violations found:**\n`;
                for (const err of fail.casingErrors) {
                  commentBody += `- ❌ ${err}\n`;
                }
                commentBody += `\n---\n\n`;
                continue;
              }

              commentBody += `#### 📁 Folder: \`${fail.folder}\`\n\n`;
              
              if (fail.missing.length > 0) {
                commentBody += `**Missing files:**\n`;
                for (const missing of fail.missing) {
                  commentBody += `- ❌ \`${missing.file}\` - ${missing.purpose}\n`;
                }
              }
              
              if (fail.present.length > 0) {
                commentBody += `\n**Present files:**\n`;
                for (const present of fail.present) {
                  commentBody += `- ✅ \`${present.file}\`\n`;
                }
              }
              commentBody += `\n---\n\n`;
            }
            
            commentBody += `### 📝 How to Fix:\n`;
            commentBody += `1. Add the missing files to your branch\n`;
            commentBody += `2. Push the changes to this PR\n`;
            commentBody += `3. The validator will automatically re-run\n\n`;
            commentBody += `📖 See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for guidelines.\n`;
            
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Submission Validation Failed')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('✅ Updated existing failure comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
              console.log('✅ Created new failure comment.');
            }

      - name: Create/Update Success Comment
        if: success() && steps.validate.outputs.hasFailures == 'false' && steps.validate.outputs.successes != '[]'
        uses: actions/github-script@v7
        env:
          SUCCESSES_JSON: ${{ steps.validate.outputs.successes }}
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const successes = JSON.parse(process.env.SUCCESSES_JSON);
            
            let commentBody = `## ✅ Submission Validation Passed!\n\n`;
            commentBody += `Great job! All required files are present.\n\n`;
            
            for (const success of successes) {
              commentBody += `### 📁 Folder: \`${success.folder}\`\n`;
              commentBody += `**Files found:**\n`;
              for (const present of success.present) {
                commentBody += `- ✅ \`${present.file}\`\n`;
              }
              commentBody += `\n`;
            }
            
            commentBody += `### 🚀 Next Steps:\n`;
            commentBody += `- The maintainer will review your PR\n`;
            commentBody += `- Respond to any feedback if requested\n`;
            commentBody += `- Once approved, your contribution will be merged!\n\n`;
            commentBody += `Thank you for contributing to EaseMotion CSS! 🎉\n`;
            
            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('Submission Validation Failed') || comment.body.includes('Submission Validation Passed'))
            );
            
            if (botComment && botComment.body.includes('Submission Validation Failed')) {
              // Update the old failure comment to show success
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('✅ Updated existing failure comment to show success.');
            } else if (!botComment) {
              // Create new success comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
              console.log('✅ Created new success comment.');
            } else {
              console.log('Success comment already exists.');
            }

      - name: Add Label for Missing Files
        if: failure() && steps.validate.outputs.hasFailures == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            try {
              const isSpam = '${{ steps.validate.outputs.isSpamExploit }}' === 'true';
              const labels = isSpam ? ['gssoc:invalid', 'invalid-submission', 'spam'] : ['needs-files', 'invalid-submission'];
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
              console.log('✅ Added labels:', labels);
            } catch (error) {
              console.log('⚠️ Could not add labels:', error.message);
            }

      - name: Close Invalid PR
        if: failure() && steps.validate.outputs.hasFailures == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const pullNumber = context.payload.pull_request.number;
              const prAuthor = context.payload.pull_request.user.login;
              const isSpam = '${{ steps.validate.outputs.isSpamExploit }}' === 'true';
              
              console.log(`Closing invalid PR #${pullNumber}...`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pullNumber,
                state: 'closed'
              });
              console.log('✅ PR successfully closed.');
              
              let commentBody;
              if (isSpam) {
                commentBody = `⚠️ **CRITICAL WARNING / BAN NOTICE** ⚠️\n\n` +
                  `Hi @${prAuthor}! 👋\n\n` +
                  `This PR has been identified as a potential exploit/low-effort contribution spam (it only modified a small number of lines and did not create or fully update all 3 required files: \`demo.html\`, \`style.css\`, and \`README.md\`).\n\n` +
                  `To maintain a fair, high-quality, and robust contribution environment, **EaseMotion CSS enforces a strict minimum modification rule**:\n` +
                  `- You must change **at least 250 lines of code** OR\n` +
                  `- You must modify/create **all three required files** in your submission folder.\n\n` +
                  `**Zero-Tolerance Policy:** Low-effort PRs opened solely to accumulate points are considered spam. Your account has been flagged. Persistent violation of this rule will result in an immediate, permanent ban from this repository and GSSoC.\n\n` +
                  `This PR has been closed and marked as **invalid**.`;
              } else {
                commentBody = `🔒 **Pull Request Closed:** This PR has been automatically closed because it failed the repository's submission validation check.\n\nTo continue contributing, please address the errors shown in the validation summary comment above in your local branch, and open a new, clean Pull Request once resolved. Thank you!`;
              }
              
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: commentBody
              });
              console.log('✅ Close comment posted.');
            } catch (error) {
              console.log('⚠️ Could not close PR or post comment:', error.message);
            }

      - name: Remove Labels on Success
        if: success() && steps.validate.outputs.hasFailures == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            try {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
              
              const labelsToRemove = ['needs-files', 'invalid-submission', 'gssoc:invalid', 'spam'];
              for (const label of labels) {
                if (labelsToRemove.includes(label.name)) {
                   await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.payload.pull_request.number,
                    name: label.name
                  });
                  console.log(`✅ Removed label: ${label.name}`);
                }
              }
            } catch (error) {
              console.log('⚠️ Could not remove labels:', error.message);
            }

      - name: Summary Output
        env:
          HAS_FAILURES: ${{ steps.validate.outputs.hasFailures }}
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_FAILURES" == "true" ]; then
            echo "❌ **Status:** Validation Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please check the comments above for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** Validation Passed" >> $GITHUB_STEP_SUMMARY
            echo "All required files are present." >> $GITHUB_STEP_SUMMARY
          fi